<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src 'self' data: https:; media-src 'self' data: https:; connect-src 'self' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>加载中</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="cl_validation.js"></script>
</head>
<body class="tear-fingerprint">
    <div id="tear-validation-marker" data-resource="TEAR-LoadScreen" data-author="TEAR" data-version="2.1.6" data-protected="true"></div>
    <div id="tear-protected-warning" class="tear-protected-warning" aria-hidden="true" style="display: none !important;"></div>
    <div id="click-ripples" class="click-ripples" aria-hidden="true"></div>
    <div id="sakura-container" class="sakura-container" aria-hidden="true"></div>
    <div id="app">
        <!-- 左上角服务器 LOGO 放置点（在 config.js 中设置 LOADSCREEN_LOGO_URL） -->
        <div id="server-logo-wrap" class="server-logo-wrap" aria-hidden="true">
            <img id="server-logo" class="server-logo" src="" alt="服务器标识">
        </div>
        <!-- 轮播层 -->
        <div id="slides" class="slides">
            <video id="slide-video" class="slide-video" playsinline preload="auto" poster="">
                <source src="" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
            <div class="slide-video-overlay" aria-hidden="true"></div>
        </div>

        <!-- 左右切换热区 -->
        <button type="button" id="prev" class="nav-btn nav-prev" aria-label="上一张">‹</button>
        <button type="button" id="next" class="nav-btn nav-next" aria-label="下一张">›</button>

        <!-- 底部信息栏：左侧迷你播放器 + 右侧提示/轮播点/进度条 -->
        <div class="bottom-bar">
            <div class="bottom-bar-left">
                <div class="mini-player">
                    <audio id="bgm" loop preload="auto" autoplay></audio>
                    <button type="button" id="player-play" class="player-btn" aria-label="播放/暂停" title="播放/暂停">
                        <span class="player-icon-play"></span>
                        <span class="player-icon-pause"></span>
                    </button>
                    <div class="player-volume">
                        <span class="player-volume-icon" aria-hidden="true"></span>
                        <input type="range" id="player-volume" class="player-volume-range" min="0" max="100" value="80" aria-label="音量">
                    </div>
                </div>
            </div>
            <div class="bottom-bar-center">
                <div id="dots" class="dots"></div>
                <p id="tip" class="tip">加载中…</p>
                <div class="progress-wrap">
                    <div id="progress-fill" class="progress-fill"></div>
                    <span id="progress-text" class="progress-text">0%</span>
                </div>
            </div>
        </div>

        <div class="view-bar">
            <div id="mode-btns" class="view-bar-modes" role="group" aria-label="显示模式" style="display: none;">
                <button type="button" class="view-btn view-btn-active" data-mode="video" aria-label="视频模式" title="视频模式">
                    <svg id="icon-video" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 3L19 12L5 21V3Z" fill="currentColor"/>
                    </svg>
                    <svg id="icon-image" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                        <path d="M23 19C23 20.1046 22.1046 21 21 21H3C1.89543 21 1 20.1046 1 19V8C1 6.89543 1.89543 6 3 6H7L9 3H15L17 6H21C22.1046 6 23 6.89543 23 8V19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button type="button" class="view-btn" data-mode="image" aria-label="图片模式" title="图片模式">
                    <svg id="icon-video-inactive" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                        <path d="M5 3L19 12L5 21V3Z" fill="currentColor"/>
                    </svg>
                    <svg id="icon-image-active" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23 19C23 20.1046 22.1046 21 21 21H3C1.89543 21 1 20.1046 1 19V8C1 6.89543 1.89543 6 3 6H7L9 3H15L17 6H21C22.1046 6 23 6.89543 23 8V19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </div>
            <div id="view-btns" class="view-bar-views" role="group" aria-label="查看方式">
                <button type="button" class="view-btn view-btn-active" data-view="carousel" aria-label="轮播" title="轮播">⊟</button>
                <button type="button" class="view-btn" data-view="grid" aria-label="网格" title="网格">▦</button>
            </div>
        </div>
        <!-- 网格缩略图区域（查看=网格时显示） -->
        <div id="grid-wrap" class="grid-wrap" aria-hidden="true">
            <div id="grid-inner" class="grid-inner"></div>
        </div>
        <!-- 大窗查看 -->
        <div id="lightbox" class="lightbox" role="dialog" aria-label="大图查看" aria-hidden="true">
            <div class="lightbox-backdrop" id="lightbox-backdrop" aria-hidden="true"></div>
            <button type="button" id="lightbox-close" class="lightbox-close" aria-label="关闭">×</button>
            <button type="button" id="lightbox-prev" class="lightbox-nav lightbox-prev" aria-label="上一张">‹</button>
            <img id="lightbox-img" class="lightbox-img" src="" alt="">
            <button type="button" id="lightbox-next" class="lightbox-nav lightbox-next" aria-label="下一张">›</button>
            <div id="lightbox-counter" class="lightbox-counter"></div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
